name: CI/CD Pipeline

on: [push]

jobs:
  # ===================================================================
  # 1 BUILD
  # ===================================================================
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          sudo rm -rf /var/lib/apt/lists/* 

      - name: Compile Code (make build)
        run: make build
        
      - name: Save compiled binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime_checker_binary 
          path: prime_checker 
  # ===================================================================
  # 2 TEST
  # ===================================================================
  test_job:
    needs: build_job 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download binary for testing
        uses: actions/download-artifact@v4
        with:
          name: prime_checker_binary 
          path: ./ 
          
      - name: Make sure binary is executable
        run: chmod +x prime_checker 

      - name: Run Tests (make test)
        run: |
          make test

  # ===================================================================
  # 3 PACKAGE
  # ===================================================================
  package_job:
    needs: test_job 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          sudo rm -rf /var/lib/apt/lists/* # Очистка apt-кеша

      - name: Download compiled binary for packaging
        uses: actions/download-artifact@v4
        with:
          name: prime_checker_binary 
          path: ./ 

      - name: Run Package (make package)
        run: |
          make package

      - name: Upload DEB package artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime-checker-deb
          path: ./*.deb 

  # ===================================================================
  # 4 DOCKER BUILD
  # ===================================================================
  docker_build_and_push:
    needs: package_job 
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout код (нужно, чтобы Dockerfile был доступен)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Скачиваем .deb пакет из предыдущей работы
      - name: Download DEB package for Docker build
        uses: actions/download-artifact@v4
        with:
          name: prime-checker-deb 
          path: ./  # сохраняем в корень репозитория

      # 3. Устанавливаем Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 4. Логинимся в Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN_FOR_LOGIN }}

      # 5. Собираем и пушим Docker-образ
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .  # контекст сборки — текущая директория
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/prime-checker:latest