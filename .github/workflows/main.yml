name: CI/CD Pipeline

on: [push]

jobs:
  # ===================================================================
  # 1 BUILD
  # ===================================================================
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          sudo rm -rf /var/lib/apt/lists/* # Добавляем очистку

      - name: Compile Code (make build)
        run: make build
        
      - name: Save compiled binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime_checker_binary 
          path: prime_checker 
  # ===================================================================
  # 2 TEST
  # ===================================================================
  test_job:
    needs: build_job 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download binary for testing
        uses: actions/download-artifact@v4
        with:
          name: prime_checker_binary 
          path: ./ 
          
      - name: Make sure binary is executable
        run: chmod +x prime_checker 

      - name: Run Tests (make test)
        run: |
          # Убедимся, что исполняемый файл prime_checker доступен в текущей директории.
          # Если make test ожидает, что prime_checker находится в PATH,
          # вам, возможно, придется добавить './' в PATH или запустить его напрямую.
          make test

  # ===================================================================
  # 3 PACKAGE
  # ===================================================================
  package_job:
    needs: test_job 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          sudo rm -rf /var/lib/apt/lists/* # Очистка apt-кеша

      - name: Download compiled binary for packaging
        uses: actions/download-artifact@v4
        with:
          name: prime_checker_binary 
          path: ./ 

      - name: Run Package (make package)
        run: |
          # Внимание: Убедитесь, что ваш 'make package' настроен так,
          # чтобы он использовал prime_checker, который находится в текущей директории.
          # Возможно, придется передать путь к бинарнику через переменную окружения
          # или подправить Makefile, чтобы он копировал prime_checker
          # в структуру пакета, а не компилировал заново.
          make package

      - name: Upload DEB package artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime-checker-deb
          path: ./*.deb 

  # ===================================================================
  # 4 DOCKER BUILD
  # ===================================================================
  docker_build_and_push:
    needs: package_job 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download DEB package for Docker build
        uses: actions/download-artifact@v4
        with:
          name: prime-checker-deb 
          path: ./ 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN_FOR_LOGIN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Используем секрет с логином для формирования полного имени репозитория
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/prime-checker:latest

      - name: Save Docker image to tar artifact
        # Здесь тоже используем секрет, чтобы команда docker save знала правильное имя образа
        run: docker save ${{ secrets.DOCKERHUB_USERNAME }}/prime-checker:latest -o docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime-checker-docker-image 
          path: docker-image.tar